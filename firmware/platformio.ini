; PlatformIO Configuration for Vector BMS
; https://platformio.org/

[env:vector_bms]
platform = ststm32
board = nucleo_l476rg
framework = stm32cube

; Use the actual Vector BMS board (custom)
board_build.mcu = stm32l476rgt6
board_build.f_cpu = 80000000L

; Build settings
build_flags = 
    -DSTM32L476xx
    -DUSE_HAL_DRIVER
    -DVECT_TAB_OFFSET=0x0
    -Iinclude

; Upload settings (ST-Link)
upload_protocol = stlink

; Debug settings
debug_tool = stlink

; Monitor settings (USB serial via CP2104)
monitor_speed = 115200

; Library dependencies
lib_deps =
    ; Add VESC CAN library when available

[env:debug]
extends = env:vector_bms
build_type = debug
build_flags = 
    ${env:vector_bms.build_flags}
    -DDEBUG
    -g3
    -O0
